<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Раздача робуксов</title>
    <style>
        :root {
            --bg-main: #0B0E14;
            --bg-card: #141923;
            --bg-input: #1C2331;
            --border-color: rgba(255, 255, 255, 0.08);
            --brand-blue: #00A2FF;
            --brand-green: #00E676;
            --text-main: #FFFFFF;
            --text-secondary: #9099A6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "HCo Gotham SSm", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 460px;
            padding: 36px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .ssl-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 230, 118, 0.08);
            border: 1px solid rgba(0, 230, 118, 0.2);
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            color: var(--brand-green);
            letter-spacing: 0.5px;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        .ssl-badge::before {
            content: "";
            width: 6px;
            height: 6px;
            background: var(--brand-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--brand-green);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .metrics-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }

        .metric-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 12px;
            text-align: left;
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .metric-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
        }

        .metric-value.highlight {
            color: var(--brand-blue);
        }

        .form-fieldset {
            border: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .input-wrapper label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .modern-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 10px;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: all 0.2s ease;
        }

        .modern-input:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 3px rgba(0, 162, 255, 0.15);
        }

        .modern-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .submit-btn {
            width: 100%;
            background: var(--brand-blue);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #008be0;
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .toast-notification {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            background: #102A43;
            border: 1px solid #1982FC;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(150%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .toast-notification.active {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            background: var(--brand-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }

        .toast-text {
            font-size: 13px;
            font-weight: 500;
            color: #E4ECF5;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="ssl-badge">Соединение защищено SSL</div>

        <h1>Roblox Plus</h1>
        <p class="subtitle">Мы дарим вам робуксы через Roblox Plus</p>
        
        <div class="metrics-container">
            <div class="metric-item">
                <div class="metric-label">Количество раздаваемых робуксов</div>
                <div class="metric-value highlight">0 R$</div>
            </div>
            <div class="metric-item">
                <div class="metric-label">Когда пополниться робуксы</div>
                <div class="metric-value" id="countdown">00.00.00 00:00</div>
            </div>
        </div>

        <form id="distributionForm" onsubmit="handleFormSubmit(event)">
            <div class="form-fieldset">
                <div class="input-wrapper">
                    <label for="robloxUser">Ваш ник в Roblox</label>
                    <input 
                        type="text" 
                        id="robloxUser" 
                        class="modern-input" 
                        placeholder="@username" 
                        required
                        autocomplete="off"
                        onblur="formatUsername(this)"
                    >
                </div>
                
                <div class="input-wrapper">
                    <label for="robuxCount">Количество R$</label>
                    <input 
                        type="number" 
                        id="robuxCount" 
                        class="modern-input" 
                        placeholder="Введите сумму, например: 10" 
                        min="10" 
                        max="5000" 
                        required
                    >
                </div>

                <button type="submit" class="submit-btn">Отправить запрос</button>
            </div>
        </form>

        <!-- Системный тост -->
        <div id="toast" class="toast-notification">
            <div class="toast-icon">✓</div>
            <div class="toast-text">Заявка успешно отправлена. Ожидайте.</div>
        </div>
    </div>

    <script>
        function formatUsername(input) {
            let value = input.value.trim();
            if (value && !value.startsWith('@')) {
                input.value = '@' + value;
            }
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            
            const toast = document.getElementById('toast');
            toast.classList.add('active');
            
            document.getElementById('distributionForm').reset();
            
            setTimeout(() => {
                toast.classList.remove('active');
            }, 4500);
        }
    </script>

</body>
</html>
